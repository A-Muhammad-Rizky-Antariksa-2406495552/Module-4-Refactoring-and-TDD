<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Order History</h3>

    <form th:action="@{/order/history}" method="post">
        <div class="form-group">
            <label for="authorInput">Author Name</label>
            <input type="text" name="author" class="form-control mb-4 col-4"
                   id="authorInput" placeholder="Enter author name">
        </div>
        <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <div th:if="${orders}" class="mt-4">
        <h5>Orders by <span th:text="${author}"></span></h5>
        <table class="table table-bordered">
            <thead>
            <tr>
                <th>ID</th>
                <th>Order Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.orderTime}"></td>
                <td th:text="${order.status}"></td>
                <td>
                    <a th:href="@{/order/pay/{id}(id=${order.id})}" class="btn btn-sm btn-success">Pay</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
