<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Payment Detail</h3>

    <form th:action="@{/payment/detail}" method="get">
        <div class="form-group">
            <label for="paymentIdInput">Payment ID</label>
            <input type="text" name="paymentId" id="paymentIdInput"
                   class="form-control mb-4 col-4" placeholder="Enter payment ID">
        </div>
        <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <div th:if="${payment}" class="mt-4">
        <table class="table table-bordered col-6">
            <tr>
                <th>Payment ID</th>
                <td th:text="${payment.id}"></td>
            </tr>
            <tr>
                <th>Method</th>
                <td th:text="${payment.method}"></td>
            </tr>
            <tr>
                <th>Status</th>
                <td th:text="${payment.status}"></td>
            </tr>
        </table>
    </div>

    <div th:if="${payment == null and paymentId != null}" class="alert alert-warning mt-4">
        Payment not found.
    </div>
</div>
</body>
</html>
