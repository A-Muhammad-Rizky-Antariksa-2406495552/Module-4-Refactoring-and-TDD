<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Pay Order</h3>

    <div class="mb-3">
        <strong>Order ID:</strong> <span th:text="${order.id}"></span>
    </div>
    <div class="mb-3">
        <strong>Status:</strong> <span th:text="${order.status}"></span>
    </div>

    <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">
        <div class="form-group">
            <label for="paymentMethod">Payment Method</label>
            <select name="paymentMethod" id="paymentMethod" class="form-control mb-4 col-4"
                    onchange="togglePaymentFields(this.value)">
                <option value="VOUCHER_CODE">Voucher Code</option>
                <option value="BANK_TRANSFER">Bank Transfer</option>
            </select>
        </div>

        <div id="voucherFields">
            <div class="form-group">
                <label for="voucherCode">Voucher Code</label>
                <input type="text" name="voucherCode" id="voucherCode"
                       class="form-control mb-4 col-4" placeholder="Enter voucher code (e.g. ESHOP1234ABC5678)">
            </div>
        </div>

        <div id="bankTransferFields" style="display:none;">
            <div class="form-group">
                <label for="bankName">Bank Name</label>
                <input type="text" name="bankName" id="bankName"
                       class="form-control mb-4 col-4" placeholder="Enter bank name">
            </div>
            <div class="form-group">
                <label for="referenceCode">Reference Code</label>
                <input type="text" name="referenceCode" id="referenceCode"
                       class="form-control mb-4 col-4" placeholder="Enter reference code">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Pay</button>
    </form>
</div>

<script>
    function togglePaymentFields(method) {
        document.getElementById('voucherFields').style.display = method === 'VOUCHER_CODE' ? 'block' : 'none';
        document.getElementById('bankTransferFields').style.display = method === 'BANK_TRANSFER' ? 'block' : 'none';
    }
</script>
</body>
</html>
